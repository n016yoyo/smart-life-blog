title: Smart Life Apps
description: >-
  AI-powered apps for everyday life: HaruBrief (AI morning briefing),
  GiftWallet (Korean gift card manager), Fridgi (food expiry tracker).
  Free apps by LEO Company.
lang: en
theme: minima

minima:
  skin: classic

author:
  name: LEO Company

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "googled130effc243a1a38.html"
    values:
      sitemap: false
  - scope:
      path: "*.md"
    values:
      sitemap: false
  - scope:
      path: "**/*.md"
    values:
      sitemap: false

exclude:
  - "*.sh"
  - "*.json"
  - "node_modules"
  - "package.json"
  - "package-lock.json"
  - "*.md"
  - "**/*.md"
