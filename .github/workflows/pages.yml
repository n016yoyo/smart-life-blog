# 레거시 Pages 빌드 큐 멈춤(2026-07-04) 우회: Actions로 직접 빌드·배포.
# 출력은 기존과 동일(Jekyll 그대로 실행, sitemap/seo 유지). URL 변화 없음.
name: Deploy Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment2.outputs.page_url || steps.deployment3.outputs.page_url }}
    steps:
      # GitHub Pages 배포 백엔드가 가끔 "Deployment failed, try again later"로 즉시 실패함(우리 워크플로 문제 아님).
      # 자동 재시도 3회(백오프 30s/60s)로 수동 재실행 없이 자가복구.
      - id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - if: steps.deployment.outcome == 'failure'
        run: sleep 30
      - id: deployment2
        if: steps.deployment.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        run: sleep 60
      - id: deployment3
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        uses: actions/deploy-pages@v4
