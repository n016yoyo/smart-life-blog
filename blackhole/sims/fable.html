<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>FABLE 5 · Black Hole</title>
<style>
  html,body{margin:0;padding:0;background:#000;height:100%;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
  #err{color:#f66;font:14px monospace;padding:20px;display:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="err"></div>
<script>
// 슈바르츠실트 블랙홀 실시간 렌더러. 광자 측지선을 셰이더 안에서 수치적분(kick-drift-kick).
// 단위: rs(슈바르츠실트 반지름)=1. 광자 유효가속 a = -1.5 h^2 r_vec / r^5 (h = |r x v|, 보존량)
// URL 파라미터: ?s=0.6(해상도 스케일) ?steps=260(적분 스텝) ?t=12(시간 고정)
// window.seekTo(t초) = 결정적 시킹(캡처용)
const Q = new URLSearchParams(location.search);
const SCALE = parseFloat(Q.get("s") || "1");
const STEPS = parseInt(Q.get("steps") || "380");
const cv = document.getElementById("c");
const gl = cv.getContext("webgl", { antialias: false, preserveDrawingBuffer: true });
if (!gl) { document.getElementById("err").style.display = "block"; document.getElementById("err").textContent = "WebGL unavailable"; }

const VERT = "attribute vec2 aP; void main(){ gl_Position = vec4(aP, 0.0, 1.0); }";

const FRAG = `
precision highp float;
uniform vec2 uRes;
uniform float uTime;
#define STEPS_N ${STEPS}
#define RS 1.0
#define R_IN 2.8
#define R_OUT 12.0

float hash13(vec3 p){ p = fract(p * 0.1031); p += dot(p, p.zyx + 31.32); return fract((p.x + p.y) * p.z); }
float hash12(vec2 p){ vec3 p3 = fract(vec3(p.xyx) * 0.1031); p3 += dot(p3, p3.yzx + 33.33); return fract((p3.x + p3.y) * p3.z); }
float vnoise(vec2 p){
  vec2 i = floor(p), f = fract(p); f = f * f * (3.0 - 2.0 * f);
  float a = hash12(i), b = hash12(i + vec2(1.0, 0.0)), c = hash12(i + vec2(0.0, 1.0)), d = hash12(i + vec2(1.0, 1.0));
  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
}
float fbm(vec2 p){
  float v = 0.0, a = 0.5;
  for (int i = 0; i < 4; i++){ v += a * vnoise(p); p = p * 2.03 + vec2(11.7, 9.2); a *= 0.5; }
  return v;
}
vec2 rot2(vec2 p, float a){ float c = cos(a), s = sin(a); return vec2(c * p.x - s * p.y, s * p.x + c * p.y); }

vec3 accel(vec3 p, float h2){
  float r2 = dot(p, p);
  return -1.5 * h2 * p / (r2 * r2 * sqrt(r2));
}

vec3 stars(vec3 d){
  vec3 col = vec3(0.0);
  for (int L = 0; L < 2; L++){
    float sc = (L == 0) ? 170.0 : 330.0;
    vec3 g = d * sc; vec3 id = floor(g); vec3 f = fract(g) - 0.5;
    float h = hash13(id);
    float m = step(0.9955, h);
    float b = smoothstep(0.4, 0.0, length(f)) * m * (0.3 + 0.7 * fract(h * 113.7));
    vec3 tint = mix(vec3(1.0, 0.85, 0.7), vec3(0.75, 0.85, 1.0), fract(h * 57.3));
    col += b * tint * ((L == 0) ? 1.0 : 0.55);
  }
  col += vec3(0.045, 0.055, 0.09) * fbm(d.xy * 3.0 + vec2(7.1, 2.3)) * fbm(d.zy * 2.5 + 4.7) * 2.2;
  return col;
}

vec4 diskShade(vec3 hit, vec3 nv, float time){
  float r = length(hit.xz);
  float edge = smoothstep(R_IN, R_IN + 0.5, r) * (1.0 - smoothstep(R_OUT - 2.8, R_OUT, r));
  if (edge < 0.002) return vec4(0.0);
  float omega = 0.75 * pow(r, -1.5);
  vec2 p2 = rot2(hit.xz, time * omega * 6.0);
  float n = fbm(p2 * 0.85) * 0.65 + fbm(p2 * 2.6) * 0.35;
  float bands = 0.72 + 0.28 * sin(r * 6.5 + n * 7.0);
  float hot = pow(R_IN / r, 2.0);
  float tt = clamp((r - R_IN) / (R_OUT - R_IN), 0.0, 1.0);
  vec3 c = mix(vec3(1.6, 1.35, 1.05), vec3(1.25, 0.5, 0.14), smoothstep(0.0, 0.7, tt));
  float beta = 1.0 / sqrt(2.0 * max(r - 1.0, 1.2));
  vec3 tang = normalize(vec3(hit.z, 0.0, -hit.x));
  float gamma = 1.0 / sqrt(1.0 - beta * beta);
  float dop = 1.0 / (gamma * (1.0 + beta * dot(tang, nv)));
  float g = sqrt(max(1.0 - 1.0 / r, 0.0));
  float I = hot * bands * (0.55 + 0.65 * n) * pow(dop, 3.0) * g * edge * 2.4;
  c = mix(c, vec3(0.75, 0.9, 1.35), clamp((dop - 1.05) * 1.2, 0.0, 0.5));
  c = mix(c, vec3(1.3, 0.45, 0.2), clamp((0.95 - dop) * 1.2, 0.0, 0.5));
  float alpha = edge * clamp(0.55 + 0.5 * n, 0.0, 1.0);
  return vec4(c * I, alpha);
}

void main(){
  vec2 uv = (2.0 * gl_FragCoord.xy - uRes) / uRes.y;
  float t = uTime;
  float az = 0.6 + 0.05 * t;
  float R = 19.5 - 2.5 * smoothstep(0.0, 40.0, t);
  float hgt = 2.1 + 0.5 * sin(t * 0.07);
  vec3 ro = vec3(R * cos(az), hgt, R * sin(az));
  vec3 fw = normalize(vec3(0.0, 0.3, 0.0) - ro);
  vec3 rt = normalize(cross(fw, vec3(0.0, 1.0, 0.0)));
  vec3 up = cross(rt, fw);
  vec3 rd = normalize(fw * 1.35 + rt * uv.x + up * uv.y);

  vec3 pos = ro; vec3 vel = rd;
  vec3 hv = cross(pos, vel); float h2 = dot(hv, hv);
  vec3 col = vec3(0.0); float trans = 1.0;
  float minR = 1e4; bool escaped = false;
  vec3 prev = pos;
  for (int i = 0; i < STEPS_N; i++){
    float r = length(pos);
    minR = min(minR, r);
    if (r < RS) break;
    if (r > 46.0 && dot(pos, vel) > 0.0){ escaped = true; break; }
    float dt = clamp(0.045 * r, 0.04, 0.5);
    vel += accel(pos, h2) * (0.5 * dt);
    prev = pos;
    pos += vel * dt;
    vel += accel(pos, h2) * (0.5 * dt);
    if (prev.y * pos.y < 0.0){
      float f = prev.y / (prev.y - pos.y);
      vec3 hit = mix(prev, pos, f);
      float rh = length(hit.xz);
      if (rh > R_IN - 0.6 && rh < R_OUT + 0.4){
        vec4 dsk = diskShade(hit, normalize(vel), t);
        col += trans * dsk.rgb;
        trans *= (1.0 - dsk.a * 0.9);
        if (trans < 0.02) break;
      }
    }
  }
  if (escaped){ col += trans * stars(normalize(vel)); }
  col += vec3(1.0, 0.62, 0.3) * 0.22 * exp(-max(minR - 1.45, 0.0) * 1.6);
  col = 1.0 - exp(-col * 1.7);
  col = pow(col, vec3(0.86));
  float vg = 1.0 - 0.35 * pow(length(uv * vec2(0.75, 0.55)), 2.2);
  col *= max(vg, 0.0);
  gl_FragColor = vec4(col, 1.0);
}
`;

function mkShader(type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, mkShader(gl.VERTEX_SHADER, VERT));
gl.attachShader(prog, mkShader(gl.FRAGMENT_SHADER, FRAG));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
const aP = gl.getAttribLocation(prog, "aP");
gl.enableVertexAttribArray(aP);
gl.vertexAttribPointer(aP, 2, gl.FLOAT, false, 0, 0);
const uRes = gl.getUniformLocation(prog, "uRes");
const uTime = gl.getUniformLocation(prog, "uTime");

function resize(){
  const dpr = (window.devicePixelRatio || 1) * SCALE;
  cv.width = Math.max(2, Math.round(innerWidth * dpr));
  cv.height = Math.max(2, Math.round(innerHeight * dpr));
  gl.viewport(0, 0, cv.width, cv.height);
}
window.addEventListener("resize", resize);
resize();

function draw(t){
  gl.uniform2f(uRes, cv.width, cv.height);
  gl.uniform1f(uTime, t);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  gl.finish();
}

let manual = false;
const start = performance.now();
function loop(now){
  if (!manual) draw((now - start) / 1000);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
window.seekTo = function(t){ manual = true; draw(t); return t; };
const t0 = Q.get("t");
if (t0 !== null) window.seekTo(parseFloat(t0));
</script>
</body>
</html>
